<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>NanoChat</title>
    <style>
        /* General body styling */
    body{
  font-family: 'Arial', sans-serif;
  background-color: #f7f7f7;
  margin: 0;
  padding: 0;
}

#container {
  margin: 0 auto;
  padding: 20px;
  background-color: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  height: 100vh;
}
h1 {
  text-align: center;
  color: #333;
  font-size: 2rem;
}

#chat {
  background-color: #f9f9f9;
  padding: 20px;
  margin-bottom: 20px;
  min-height: 400px;
  height: 60vh;
  overflow-y: auto;
  border-radius: 8px;
}

#chat p {
  margin: 15px 0;
}

#main {
  position: absolute;
  bottom: 25px;
  width:90vw;
  display: flex;
  gap: 20px;
}

input[type="text"] {
  width: 80%;
  padding: 10px;
  border-radius: 25px;
  border: 1px solid #ddd;
  font-size: 1rem;
}

button {
  padding: 10px 15px;
  background-color: #007bff;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

button:hover {
  background-color: #0056b3;
}
    </style>
</head>
<body>
    <div id="container">
        <h1>NanoChat</h1>
            
          </object>
        <div id="chat"></div>
        <div id="main">
            <input type="text" id="input" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("input");
            const chat = document.getElementById("chat");

            const message = input.value;
            if (!message) return;
            const token= localStorage.getItem('token');
            if(!token){
              window.location="register.html";
            };

            chat.innerHTML += `<p><b>You:</b> ${message}</p>`;
            input.value = "";
            input.disabled = true;

            chat.innerHTML += `<p><b>Bot:</b> <i>Thinking...</i></p>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch("http://localhost:3000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    "Authorization": Bearer ${token}
                    },
                    body: JSON.stringify({ message }),
                });

                const data = await response.json();
                chat.innerHTML = chat.innerHTML.replace(`<i>Thinking...</i>`, `<b>Bot:</b> ${data.reply}`);
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                console.error("Error:", error);
                chat.innerHTML = chat.innerHTML.replace(`<i>Thinking...</i>`, `<b>Bot:</b> Something went wrong. Please try again later.`);
            }

            input.disabled = false;
        }
    </script>
</body>
</html>
