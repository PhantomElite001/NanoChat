<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>NanoChat — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0d0d0d;
        --surface: #161618;
        --surface2: #1e1e21;
        --border: #2a2a2e;
        --accent: #00e5ff;
        --accent-dim: rgba(0, 229, 255, 0.08);
        --text: #e8e8ec;
        --text-dim: #666672;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      header {
        position: fixed;
        top: 0; left: 0; right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      header h1 {
        font-family: 'Space Mono', monospace;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--accent);
        text-transform: uppercase;
      }

      header h1::before { content: '> '; opacity: 0.4; }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 36px 32px;
        width: 100%;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .card h2 {
        font-family: 'Space Mono', monospace;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .card h2::before { content: '> '; opacity: 0.4; }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .field input {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 16px;
        color: var(--text);
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }

      .field input:focus { border-color: var(--accent); }
      .field input::placeholder { color: var(--text-dim); }

      button {
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 10px;
        padding: 11px 20px;
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        width: 100%;
      }

      button:hover  { opacity: 0.85; }
      button:active { transform: scale(0.98); }

      .footer-link {
        text-align: center;
        font-size: 0.82rem;
        color: var(--text-dim);
      }

      .footer-link a {
        color: var(--accent);
        text-decoration: none;
        opacity: 0.8;
        transition: opacity 0.2s;
      }

      .footer-link a:hover { opacity: 1; }
    </style>
</head>
<body>

  <header>
    <h1>NanoChat</h1>
  </header>

  <div class="card">
    <h2>Login</h2>

    <div class="field">
      <label for="user">Username</label>
      <input id="user" type="text" placeholder="Enter username">
    </div>

    <div class="field">
      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="Enter password">
    </div>

    <button onclick="login()">Login</button>

    <p class="footer-link">No account? <a href="/register">Register</a></p>
  </div>

  <script>
    async function login() {
      const token=localStorage.getItem('token');
      if(token){
          return window.location="/app";
};
      const username = document.getElementById("user").value;
      const password = document.getElementById("pass").value;

      const res = await fetch("https://nanochat-6ypd.onrender.com/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: username, password })
      });

      const data = await res.json();
      localStorage.setItem("token", data.token);
      window.location = "/app";
    }
  </script>

</body>
</html>
